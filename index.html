<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickZap</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1c1c1e;
      --surface:     #2c2c2e;
      --surface2:    #3a3a3c;
      --border:      rgba(255,255,255,0.10);
      --accent:      #25d366;
      --accent-dim:  rgba(37,211,102,0.20);
      --accent-hover:#1db954;
      --text:        #f2f2f7;
      --text2:       rgba(242,242,247,0.50);
      --btn-bg:      #2c2c2e;
      --btn-hover:   #3a3a3c;
      --shadow:      0 2px 8px rgba(0,0,0,0.4);
      --r:           10px;
    }

    body.light {
      --bg:       #f2f2f7;
      --surface:  #ffffff;
      --surface2: #e5e5ea;
      --border:   rgba(0,0,0,0.09);
      --text:     #1c1c1e;
      --text2:    rgba(28,28,30,0.45);
      --btn-bg:   #e5e5ea;
      --btn-hover:#d1d1d6;
      --shadow:   0 2px 8px rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 16px 20px 22px;
      gap: 12px;
    }

    /* ── Titlebar ── */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    .titlebar-brand {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .app-icon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      object-fit: cover;
      pointer-events: none;
    }

    .app-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .titlebar-actions {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .btn-icon {
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      -webkit-app-region: no-drag;
    }
    .btn-icon:hover { color: var(--text); background: var(--surface2); }

    /* ── Description ── */
    .description {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.45;
      flex-shrink: 0;
    }

    /* ── Inputs ── */
    .input-row {
      display: flex;
      gap: 8px;
      flex-shrink: 0;

    }

    .prefix-wrapper {
      display: flex;
      align-items: center;
      gap: 2px;
      width: 88px;
      flex-shrink: 0;
      padding: 0 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .prefix-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .plus-sign {
      color: var(--text2);
      font-family: 'SF Mono', SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 15px;
      flex-shrink: 0;
    }

    .prefix-wrapper input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'SF Mono', SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 15px;
      outline: none;
      width: 100%;
      padding: 11px 0;
    }
    .prefix-wrapper input::placeholder { color: var(--text2); font-size: 12px; }

    #number {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'SF Mono', SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 15px;
      outline: none;
      box-shadow: var(--shadow);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #number:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    #number::placeholder { color: var(--text2); font-size: 13px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 8px;
      flex-shrink: 0;

    }

    .tool-btn {
      flex: 1;
      height: 38px;
      border: 1px solid var(--border);
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      border-radius: var(--r);
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, transform 0.08s, box-shadow 0.12s;
      box-shadow: var(--shadow);
    }
    .tool-btn:hover  { background: var(--btn-hover); }
    .tool-btn:active { transform: scale(0.93); box-shadow: none; }
    .tool-btn.active { color: var(--accent); border-color: var(--accent); }

    /* ── History ── */
    .history-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow);
      flex-shrink: 0;

    }

    .history-scroll { max-height: 108px; overflow-y: auto; }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--surface2); }

    .history-number {
      font-family: 'SF Mono', SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 13px;
      color: var(--text);
    }

    .history-actions { display: flex; gap: 2px; }

    .hist-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 11px;
      width: 22px;
      height: 22px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
    }
    .hist-btn:hover { color: var(--text); background: var(--surface2); }

    .history-empty {
      padding: 14px;
      text-align: center;
      color: var(--text2);
      font-size: 12px;
    }

    /* ── Preview ── */
    .preview {
      font-family: 'SF Mono', SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 11px;
      color: var(--text2);
      min-height: 14px;
      margin-top: auto;

    }
    .preview.valid { color: var(--accent); }

    /* ── Main Button ── */
    .btn-open {
      background: var(--accent);
      border: none;
      border-radius: var(--r);
      color: #000;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 20px;
      letter-spacing: -0.01em;
      transition: background 0.15s, transform 0.08s;
      flex-shrink: 0;

    }
    .btn-open:hover    { background: var(--accent-hover); }
    .btn-open:active   { transform: scale(0.98); }
    .btn-open:disabled { opacity: 0.28; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
  <div class="app">

    <!-- Titlebar -->
    <div class="titlebar">
      <div class="titlebar-brand">
        <img src="assets/icon.png" class="app-icon" alt="QuickZap" draggable="false">
        <span class="app-name">QuickZap</span>
      </div>
      <div class="titlebar-actions">
        <button class="btn-icon" id="btn-minimize" title="Minimizar">–</button>
        <button class="btn-icon" id="btn-close"    title="Fechar">✕</button>
      </div>
    </div>

    <!-- Description -->
    <p class="description" id="txt-description">Insira ou cole o número que deseja contatar:</p>

    <!-- Inputs -->
    <div class="input-row">
      <div class="prefix-wrapper">
        <span class="plus-sign">+</span>
        <input type="text" id="prefix" placeholder="Código" maxlength="4" autocomplete="off" spellcheck="false">
      </div>
      <input type="text" id="number" placeholder="DDD e número" autocomplete="off" spellcheck="false">
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="tool-btn" id="btn-back"    title="Limpar campos">↩</button>
      <button class="tool-btn" id="btn-paste"   title="Colar do clipboard">⎘</button>
      <button class="tool-btn" id="btn-history" title="Histórico de números">☰</button>
      <button class="tool-btn" id="btn-lang"    title="Switch to English">🇧🇷</button>
      <button class="tool-btn" id="btn-theme"   title="Alternar tema">🌙</button>
    </div>

    <!-- History panel (hidden by default) -->
    <div class="history-panel" id="history-panel" style="display:none">
      <div class="history-scroll" id="history-scroll"></div>
    </div>

    <!-- Preview -->
    <div class="preview" id="preview"></div>

    <!-- Main button -->
    <button class="btn-open" id="btn-open" disabled>Abrir o WhatsApp</button>

  </div>

  <script>
    const prefixEl   = document.getElementById('prefix')
    const numberEl   = document.getElementById('number')
    const btnOpen    = document.getElementById('btn-open')
    const previewEl  = document.getElementById('preview')
    const histPanel  = document.getElementById('history-panel')
    const histScroll = document.getElementById('history-scroll')

    // ── i18n ───────────────────────────────────────────────
    const STRINGS = {
      pt: {
        description:    'Insira ou cole o número que deseja contatar:',
        placeholder_p:  'Código',
        placeholder_n:  'DDD e número',
        btn_open:       'Abrir o WhatsApp',
        hist_empty:     'Nenhum número recente',
        hist_use:       'Usar',
        hist_del:       'Remover',
        tip_back:       'Limpar campos',
        tip_paste:      'Colar do clipboard',
        tip_history:    'Histórico de números',
        tip_lang:       'Switch to English',
        tip_theme:      'Alternar tema',
        digits:         n => `${n} dígito(s) — mínimo 8`,
      },
      en: {
        description:    'Insert or paste the number you want to contact:',
        placeholder_p:  'Code',
        placeholder_n:  'Area code and number',
        btn_open:       'Open WhatsApp',
        hist_empty:     'No recent numbers',
        hist_use:       'Use',
        hist_del:       'Remove',
        tip_back:       'Clear fields',
        tip_paste:      'Paste from clipboard',
        tip_history:    'Number history',
        tip_lang:       'Mudar para Português',
        tip_theme:      'Toggle theme',
        digits:         n => `${n} digit(s) — minimum 8`,
      },
    }

    let lang = 'pt'
    const langBtn = document.getElementById('btn-lang')

    function applyLang(l) {
      lang = l
      const s = STRINGS[l]
      document.getElementById('txt-description').textContent = s.description
      prefixEl.placeholder  = s.placeholder_p
      numberEl.placeholder  = s.placeholder_n
      btnOpen.textContent   = s.btn_open
      langBtn.textContent   = l === 'pt' ? '🇧🇷' : '🇺🇸'
      langBtn.title         = s.tip_lang
      document.getElementById('btn-back').title    = s.tip_back
      document.getElementById('btn-paste').title   = s.tip_paste
      document.getElementById('btn-history').title = s.tip_history
      document.getElementById('btn-theme').title   = s.tip_theme
      updateUI()
      if (histVisible) renderHistory()
    }

    langBtn.addEventListener('mousedown', (e) => { e.preventDefault(); applyLang(lang === 'pt' ? 'en' : 'pt') })

    // ── Theme ─────────────────────────────────────────────
    const themeBtn = document.getElementById('btn-theme')
    if (localStorage.getItem('qz-theme') === 'light') applyTheme('light')

    themeBtn.addEventListener('mousedown', (e) => {
      e.preventDefault()
      applyTheme(document.body.classList.contains('light') ? 'dark' : 'light')
    })

    function applyTheme(t) {
      document.body.classList.toggle('light', t === 'light')
      themeBtn.textContent = t === 'light' ? '☀️' : '🌙'
      localStorage.setItem('qz-theme', t)
    }

    // ── Helpers ────────────────────────────────────────────
    function clean(v) { return (v || '').replace(/\D/g, '') }
    function getFullNumber() { return clean(prefixEl.value) + clean(numberEl.value) }
    function isValid() {
      return clean(prefixEl.value).length >= 1 && clean(numberEl.value).length >= 8
    }

    function updateUI() {
      const valid = isValid()
      btnOpen.disabled = !valid
      if (valid) {
        previewEl.textContent = `wa.me/${getFullNumber()}`
        previewEl.className = 'preview valid'
      } else {
        const d = clean(numberEl.value).length
        previewEl.textContent = d > 0 ? STRINGS[lang].digits(d) : ''
        previewEl.className = 'preview'
      }
    }

    prefixEl.addEventListener('input', updateUI)
    numberEl.addEventListener('input', updateUI)

    prefixEl.addEventListener('keydown', e => {
      if (e.key === 'Tab' || e.key === 'Enter') { e.preventDefault(); numberEl.focus() }
    })
    numberEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !btnOpen.disabled) openWA()
      if (e.key === 'Escape') window.quickzap.closeWindow()
    })

    // ── Open WhatsApp ──────────────────────────────────────
    function openWA() {
      if (!isValid()) return
      const full = getFullNumber()
      addToHistory(full)
      window.quickzap.openWhatsApp(full)
    }

    btnOpen.addEventListener('mousedown', (e) => { e.preventDefault(); openWA() })

    // ── Clear ──────────────────────────────────────────────
    document.getElementById('btn-back').addEventListener('mousedown', (e) => {
      e.preventDefault()
      prefixEl.value = ''
      numberEl.value = ''
      updateUI()
      numberEl.focus()
    })

    // ── Paste ──────────────────────────────────────────────
    document.getElementById('btn-paste').addEventListener('mousedown', (e) => {
      e.preventDefault()
      window.quickzap.readClipboard().then(text => { fillInputs(text); numberEl.focus() })
    })

    function fillInputs(raw) {
      const digits = clean(raw)
      if (!digits) return
      if (digits.length > 11) {
        prefixEl.value = digits.slice(0, 2)
        numberEl.value = digits.slice(2)
      } else {
        if (!clean(prefixEl.value)) prefixEl.value = '55'
        numberEl.value = digits
      }
      updateUI()
    }

    // ── History ────────────────────────────────────────────
    function getHistory() {
      try { return JSON.parse(localStorage.getItem('qz-history') || '[]') } catch { return [] }
    }
    function addToHistory(num) {
      let h = getHistory().filter(n => n !== num)
      h.unshift(num)
      localStorage.setItem('qz-history', JSON.stringify(h.slice(0, 15)))
    }
    function removeFromHistory(num) {
      localStorage.setItem('qz-history', JSON.stringify(getHistory().filter(n => n !== num)))
    }

    function renderHistory() {
      const h = getHistory()
      const s = STRINGS[lang]
      if (!h.length) {
        histScroll.innerHTML = `<div class="history-empty">${s.hist_empty}</div>`
        return
      }
      histScroll.innerHTML = h.map(n => `
        <div class="history-item" data-n="${n}">
          <span class="history-number">+${n}</span>
          <div class="history-actions">
            <button class="hist-btn" data-action="use" data-n="${n}" title="${s.hist_use}">↗</button>
            <button class="hist-btn" data-action="del" data-n="${n}" title="${s.hist_del}">✕</button>
          </div>
        </div>`).join('')

      histScroll.querySelectorAll('.history-item').forEach(item => {
        item.addEventListener('click', () => { fillInputs(item.dataset.n); toggleHistory(false); numberEl.focus() })
      })
      histScroll.querySelectorAll('.hist-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation()
          if (btn.dataset.action === 'del') { removeFromHistory(btn.dataset.n); renderHistory() }
          else { fillInputs(btn.dataset.n); toggleHistory(false); numberEl.focus() }
        })
      })
    }

    let histVisible = false
    const histBtn = document.getElementById('btn-history')

    function toggleHistory(force) {
      histVisible = force !== undefined ? force : !histVisible
      histPanel.style.display = histVisible ? 'block' : 'none'
      histBtn.classList.toggle('active', histVisible)
      if (histVisible) renderHistory()
    }

    histBtn.addEventListener('mousedown', (e) => { e.preventDefault(); toggleHistory() })

    // ── IPC from main process ──────────────────────────────
    window.quickzap.onPastePhone(value => { fillInputs(value); numberEl.focus() })

    document.getElementById('btn-close').addEventListener('mousedown', (e) => { e.preventDefault(); window.quickzap.closeWindow() })
    document.getElementById('btn-minimize').addEventListener('mousedown', (e) => { e.preventDefault(); window.quickzap.minimizeWindow() })

    // ── Init ───────────────────────────────────────────────
    prefixEl.value = '55'
    applyLang(lang)
    numberEl.focus()
  </script>
</body>
</html>
